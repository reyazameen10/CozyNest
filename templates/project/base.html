<!-- base.html -->
<!-- This template serves as the base for all other templates in the project app. It defines the overall structure and layout of the pages. -->
<!-- Rey Ameen, CS412 -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CozyNest</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:
linear-gradient(rgba(72, 71, 42, 0.48), rgba(202, 75, 33, 0.48)),
url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* navbar */
.navbar{
    background: rgba(255,248,240,.90) !important;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(120,90,60,.08);
}

/* all white content cards */
.cozy-card{
    background: rgba(89, 183, 237, 0.92);
    border-radius: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,.08);
}

/* buttons */
.btn-dark{
    background:#2d2d2d;
    border:none;
}

.btn-dark:hover{
    background:#111;
}

/* hero glow */
.hero-glow{
    background: linear-gradient(135deg,#ee8686,#78d3e1);
    box-shadow:0 20px 50px rgba(0,0,0,.08);
}

.glass-box{
    backdrop-filter: blur(18px);
    background: rgba(255,245,235,.90);
    backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,.22);
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

/* cards hover */
.card{
    transition:all .25s ease;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 16px 30px rgba(236, 239, 229, 0.068);
}

.card{
    transition: all .25s ease;
    overflow: hidden;
}

.card img{
    transition: transform .4s ease;
}

.card:hover{
    transform: translateY(-6px);
    box-shadow: 0 16px 30px rgba(0,0,0,.12);
}

.card:hover img{
    transform: scale(1.05);
}

.form-control{
    background: rgba(255,255,255,.88);
    backdrop-filter: blur(8px);
    border: none;
    box-shadow: 0 4px 14px rgba(0,0,0,.08);
}

.form-control:focus{
    background: rgba(255,255,255,.95);
    box-shadow: 0 0 0 0.2rem rgba(255,255,255,.25);
    border: none;
}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg shadow-sm py-3 sticky-top">
<div class="container">

<a class="navbar-brand fw-bold fs-3 text-dark" href="{% url 'listing_list' %}">
🏡 CozyNest
</a>

<div class="d-flex align-items-center gap-2">

<span class="text-muted small d-none d-md-inline">
Feel at home, anywhere
</span>

{% if user.is_authenticated %}

<a href="{% url 'host_dashboard' %}" class="btn btn-outline-dark rounded-pill px-4">
Host Dashboard
</a>

<span class="fw-bold">Hi, {{ user.username }}</span>

<form method="post" action="{% url 'logout' %}">
{% csrf_token %}
<button class="btn btn-outline-dark rounded-pill px-4">
Logout
</button>
</form>

{% else %}

<a href="{% url 'login' %}" class="btn btn-outline-dark rounded-pill px-4">
Login
</a>

<a href="{% url 'signup' %}" class="btn btn-dark rounded-pill px-4">
Sign Up
</a>

{% endif %}

</div>
</div>
</nav>

{% block content %}
{% endblock %}

<footer class="text-center text-light py-5 mt-5">
    CozyNest © 2026 • Warm stays everywhere
</footer>

</body>
</html>
