<!-- Create Listing Template -->
<!-- Rey Ameen, CS412 -->

<!DOCTYPE html>
<html>
<head>
    <title>Add Property | CozyNest</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background:
                linear-gradient(rgba(58,38,22,.62), rgba(58,38,22,.62)),
                url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif;
        }

        .form-glass {
            max-width: 750px;
            margin: 80px auto;
            background: rgba(255,245,235,0.78);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255,255,255,.35);
            border-radius: 30px;
            padding: 45px;
            box-shadow: 0 25px 70px rgba(0,0,0,.45);
        }

        input, textarea, select {
            width: 100%;
            border-radius: 12px;
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="form-glass">

        <h1 class="fw-bold">Add Your Property</h1>
        <p class="text-muted">
            List your apartment, room, or cozy stay on CozyNest.
        </p>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-dark rounded-pill px-4">
                Create Listing
            </button>

            <a href="{% url 'listing_list' %}" class="btn btn-outline-dark rounded-pill px-4">
                Cancel
            </a>
        </form>

    </div>
</div>

</body>
</html>
